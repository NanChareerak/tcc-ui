<div class="page-header">
  <!-- <h1>IT01 Person</h1>
  <div class="breadcrumb">Home • IT01 Person</div> -->
</div>

<div class="person-card">
  <div class="person-card__toolbar">
    <div class="search-box">
      <input
        nz-input
        [(ngModel)]="searchKeyword"
        placeholder="Search name / address"
        (ngModelChange)="onSearchKeywordChange()"
        (keyup.enter)="onSearch()" />

      <button nz-button nzType="default" type="button" (click)="onSearch()">
        Search
      </button>

      <button nz-button nzType="default" type="button" (click)="onRefresh()">
        Refresh
      </button>
    </div>

    <button nz-button nzType="primary" type="button" (click)="onAdd()">
      Add
    </button>
  </div>

  <nz-table
    #basicTable
    [nzData]="persons"
    [nzFrontPagination]="false"
    [nzShowPagination]="false"
    [nzBordered]="true">
    <thead>
      <tr>
        <th style="width: 80px; text-align: center;">No.</th>
        <th style="width: 240px;">ชื่อ-สกุล</th>
        <th style="width: 180px;">วันเกิด</th>
        <th style="width: 120px; text-align: center;">อายุ</th>
        <th>ที่อยู่</th>
        <th style="width: 120px; text-align: center;">Action</th>
      </tr>
    </thead>
    <tbody>
      @for (item of basicTable.data; track item.id; let i = $index) {
        <tr>
          <td style="text-align: center;">{{ getDisplayId(i) }}</td>
          <td>{{ getFullName(item) }}</td>
          <td>{{ item.birthDate }}</td>
          <td style="text-align: center;">{{ item.age }}</td>
          <td>{{ item.address }}</td>
          <td style="text-align: center;">
            <button nz-button nzType="default" type="button" (click)="onView(item)">
              View
            </button>
          </td>
        </tr>
      }
    </tbody>
  </nz-table>

  <div class="person-card__pagination">
    <div class="pagination-summary">
      Total: {{ total }} | Page: {{ request.page }} / {{ totalPages || 1 }}
    </div>

    <nz-pagination
      [nzPageIndex]="request.page"
      [nzTotal]="total"
      [nzPageSize]="request.pageSize"
      [nzShowSizeChanger]="true"
      [nzPageSizeOptions]="[10, 50, 100]"
      (nzPageIndexChange)="onPageIndexChange($event)"
      (nzPageSizeChange)="onPageSizeChange($event)">
    </nz-pagination>
  </div>
</div>

<app-person-modal
  [(visible)]="modalVisible"
  [mode]="modalMode"
  [data]="modalData"
  (save)="onSave($event)">
</app-person-modal>
