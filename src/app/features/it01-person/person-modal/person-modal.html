<nz-modal
  [(nzVisible)]="visible"
  [nzTitle]="isViewMode ? 'IT 01-3' : (isEditMode ? 'IT 01-4' : 'IT 01-2')"
  [nzFooter]="null"
  [nzClosable]="false"
  [nzMaskClosable]="false"
  [nzWidth]="760"
>
  <ng-container *nzModalContent>
    <div class="form">

      <div class="row">
        <label>ชื่อ - สกุล</label>
        <div class="name">
          <input [(ngModel)]="formData.firstName" [disabled]="isViewMode" />
          <input [(ngModel)]="formData.lastName" [disabled]="isViewMode" />
        </div>
      </div>

      <div class="row">
        <label>วันเกิด</label>
        <input
          type="date"
          [(ngModel)]="formData.dateOfBirth"
          (ngModelChange)="onBirthDateChange()"
          [disabled]="isViewMode"
        />
      </div>

      <div class="row">
        <label>อายุ</label>
        <div>{{ formData.age }} ปี</div>
      </div>

      <div class="row">
        <label>ที่อยู่</label>
        <textarea [(ngModel)]="formData.address" [disabled]="isViewMode"></textarea>
      </div>

      <div class="actions">
        @if (!isViewMode) {
          <button nz-button nzType="primary" type="button" (click)="onSave()">
            บันทึก
          </button>
          <button nz-button nzDanger type="button" (click)="close()">
            ยกเลิก
          </button>
        } @else {
          <button nz-button nzDanger type="button" (click)="close()">
            ปิด
          </button>
        }
      </div>

    </div>
  </ng-container>
</nz-modal>
