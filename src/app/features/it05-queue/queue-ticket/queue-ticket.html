<div class="queue-ticket-page">
  <div class="page-header">
    <h1>Queue Ticket</h1>
    <div class="breadcrumb">Home - Queue - Ticket</div>
  </div>

  <div class="page-card">
    <nz-card class="ticket-card">
      <div class="queue-sub-title">หมายเลขคิว</div>

      <div class="queue-no">{{ queueNo() }}</div>

      @if (issuedAt()) {
        <div class="queue-datetime">
          วันที่: {{ issuedAt() | date:'dd/MM/yyyy HH:mm' }} น.
        </div>
      }

      <div class="button-group">
        <button nz-button type="button" (click)="goHome()">กลับหน้ารับบัตรคิว</button>
        <button nz-button nzType="primary" type="button" (click)="goCurrent()">ลำดับคิว</button>
      </div>
    </nz-card>
  </div>
</div>
