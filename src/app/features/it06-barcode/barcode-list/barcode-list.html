<div class="toolbar">
  <form nz-form [formGroup]="searchForm" class="search-form">
    <input
      nz-input
      formControlName="keyword"
      placeholder="Search code / name" />

    <button nz-button nzType="default" type="button" (click)="onSearch()">
      Search
    </button>

    <button nz-button nzType="default" type="button" (click)="onRefresh()">
      Refresh
    </button>
  </form>

  <button nz-button nzType="primary" type="button" (click)="openCreateModal()">
    Add
  </button>
</div>

<nz-table
  nzBordered
  [nzData]="items()"
  [nzLoading]="loading()"
  [nzFrontPagination]="false"
  [nzTotal]="total()"
  [nzPageIndex]="page()"
  [nzPageSize]="pageSize()"
  (nzQueryParams)="onQueryParamsChange($event)">
  <thead>
    <tr>
      <th nzWidth="80px">No.</th>
      <th>Code</th>
      <th>Name</th>
      <th>Description</th>
      <th nzWidth="120px">Status</th>
      <th nzWidth="180px">Action</th>
    </tr>
  </thead>
  <tbody>
    @for (item of items(); track item.id; let i = $index) {
      <tr>
        <td>{{ ((page() - 1) * pageSize()) + i + 1 }}</td>
        <td>{{ item.code }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.description || '-' }}</td>
        <td>{{ item.isActive ? 'Active' : 'Inactive' }}</td>
        <td>
          <nz-space>
            <button *nzSpaceItem nz-button nzType="link" type="button" (click)="openEditModal(item)">
              Edit
            </button>

            <button
              *nzSpaceItem
              nz-button
              nzType="link"
              nzDanger
              type="button"
              nz-popconfirm
              nzPopconfirmTitle="ยืนยันการลบข้อมูลนี้?"
              (nzOnConfirm)="deleteItem(item)">
              Delete
            </button>
          </nz-space>
        </td>
      </tr>
    }
  </tbody>
</nz-table>



<app-barcode-modal
  [visible]="modalVisible()"
  [mode]="modalMode()"
  [item]="editingItem()"
  (closed)="closeModal()"
  (saved)="handleSaved()" />
